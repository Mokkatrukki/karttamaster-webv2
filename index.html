<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Karttamaster</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; font-family: sans-serif; }

      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding-bottom: 68px;
      }

      /* ── Toolbar ── */
      #toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: #1a1a2e;
        color: #fff;
        flex-shrink: 0;
        position: relative;
        z-index: 200;
      }
      #toolbar h1 { font-size: 14px; font-weight: 600; margin-right: 8px; }

      button {
        padding: 6px 14px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
      }

      #btn-add-sign { background: #f59e0b; color: #111; }
      #btn-add-sign.place-mode { background: #ef4444; color: #fff; }
      #btn-list     { background: #a78bfa; color: #111; }

      .place-mode-label {
        font-size: 12px;
        color: #fde68a;
        display: none;
      }
      .place-mode-label.active { display: inline; }

      /* ── Sign type dropdown (toolbar) ── */
      #sign-type-dropdown {
        position: fixed;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        padding: 8px;
        display: none;
        flex-direction: column;
        gap: 4px;
        min-width: 180px;
        z-index: 2000;
      }
      #sign-type-dropdown.open { display: flex; }

      /* ── Floating sign picker (dblclick) ── */
      #floating-picker {
        position: fixed;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        padding: 8px;
        display: none;
        flex-direction: column;
        gap: 4px;
        min-width: 180px;
        z-index: 1003;
      }
      #floating-picker.open { display: flex; }

      /* ── Sign type buttons (shared style) ── */
      .sign-type-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        min-height: 44px;
        border-radius: 8px;
        background: #f9fafb;
        border: none;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        text-align: left;
        transition: background 0.1s;
      }
      .sign-type-btn:hover { background: #f3f4f6; }
      .sign-type-btn .sign-swatch {
        width: 20px; height: 20px; border-radius: 50%;
        flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-size: 12px;
      }

      /* ── Map ── */
      #map { flex: 1; min-height: 0; touch-action: manipulation; }
      #map.place-mode { cursor: crosshair !important; }
      #map.place-mode .leaflet-container { cursor: crosshair !important; }

      /* ── Route bar (always visible, fixed bottom) ── */
      #route-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 68px;
        background: #1a1a2e;
        color: #fff;
        z-index: 100;
        display: flex;
        flex-direction: column;
        padding: 8px 12px 10px;
        gap: 6px;
      }

      #route-bar-top {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #route-km {
        font-size: 13px;
        font-weight: 600;
        color: #e5e7eb;
        min-width: 110px;
      }

      #route-drive-controls {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-left: auto;
      }
      #btn-route-prev, #btn-route-next { background: #374151; color: #fff; padding: 8px 20px; font-size: 16px; min-height: 44px; }

      /* ── Progress track ── */
      #route-track {
        position: relative;
        height: 12px;
        background: #374151;
        border-radius: 6px;
        cursor: pointer;
        user-select: none;
        touch-action: none;
      }

      #route-track-fill {
        position: absolute;
        left: 0; top: 0; height: 100%;
        background: #f59e0b;
        border-radius: 6px;
        pointer-events: none;
        width: 0%;
      }

      #route-track-handle {
        position: absolute;
        top: 50%; left: 0%;
        transform: translate(-50%, -50%);
        width: 18px; height: 18px;
        background: #fff;
        border-radius: 50%;
        box-shadow: 0 1px 4px rgba(0,0,0,0.5);
        pointer-events: none;
      }

      .route-sign-dot {
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 10px; height: 10px;
        border-radius: 50%;
        border: 2px solid #fff;
        cursor: pointer;
      }

      .route-sign-dot .sign-tooltip {
        display: none;
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.85);
        color: #fff;
        font-size: 11px;
        padding: 3px 7px;
        border-radius: 4px;
        white-space: nowrap;
        pointer-events: none;
        z-index: 10;
      }
      .route-sign-dot:hover .sign-tooltip { display: block; }

      /* ── Marker modal ── */
      #marker-modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.4);
        z-index: 999;
        display: none;
      }
      #marker-modal-backdrop.open { display: block; }

      #marker-modal {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: min(320px, 90vw);
        max-height: 60vh;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        z-index: 1000;
        display: none;
        flex-direction: column;
        overflow: hidden;
      }
      #marker-modal.open { display: flex; }

      #marker-modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid #e5e7eb;
        background: #f9fafb;
        flex-shrink: 0;
      }
      #marker-modal-header h2 { font-size: 14px; font-weight: 600; }
      #btn-modal-close {
        background: none; border: none;
        font-size: 18px; color: #6b7280;
        cursor: pointer; padding: 2px 6px;
      }

      #marker-modal-items { overflow-y: auto; flex: 1; }

      .marker-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid #f3f4f6;
        font-size: 13px;
        cursor: pointer;
      }
      .marker-item:hover { background: #f9fafb; }
      .marker-item--new { background: #fef9c3; }
      .marker-item .marker-icon { font-size: 18px; }
      .marker-item .marker-info { flex: 1; }
      .marker-item .marker-km { color: #6b7280; font-size: 11px; }
      .marker-item .btn-delete {
        background: none; border: none;
        color: #ef4444; cursor: pointer;
        font-size: 16px; padding: 2px 6px;
        min-width: 44px; min-height: 44px;
        display: flex; align-items: center; justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <h1>Karttamaster</h1>
        <button id="btn-add-sign">+ Lisää merkki</button>
        <span class="place-mode-label" id="place-mode-label">Napauta karttaa · Esc peruuttaa</span>
        <button id="btn-list">☰ Lista</button>
        <button id="btn-layer" style="background:#334155;color:#e2e8f0;margin-left:auto">MML Taustakartta</button>
      </div>
      <div id="map"></div>
    </div>

    <!-- Route progress bar — always visible -->
    <div id="route-bar">
      <div id="route-bar-top">
        <span id="route-km">0.0 / 0.0 km</span>
        <div id="route-drive-controls">
          <button id="btn-route-prev">◀</button>
          <button id="btn-route-next">▶</button>
        </div>
      </div>
      <div id="route-track">
        <div id="route-track-fill"></div>
        <div id="route-track-handle"></div>
      </div>
    </div>

    <!-- Marker list modal -->
    <div id="marker-modal-backdrop"></div>
    <div id="marker-modal">
      <div id="marker-modal-header">
        <h2>Merkit (<span id="marker-count">0</span>)</h2>
        <button id="btn-modal-close">✕</button>
      </div>
      <div id="marker-modal-items"></div>
    </div>

    <!-- Sign type dropdown — positioned by JS below btn-add-sign -->
    <div id="sign-type-dropdown"></div>

    <!-- Floating sign picker — positioned by JS on dblclick -->
    <div id="floating-picker"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
