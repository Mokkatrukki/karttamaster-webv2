<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Karttamaster</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <h1>Karttamaster</h1>
        <button id="btn-add-sign">+ Merkki</button>
        <span class="place-mode-label" id="place-mode-label">Napauta karttaa · Esc peruuttaa</span>
        <button id="btn-list">☰ Lista</button>
        <button id="btn-role">Järjestäjä</button>
        <button id="btn-gps">📍 GPS</button>
        <button id="btn-layer" style="margin-left:auto">MML Taustakartta</button>
      </div>
      <div id="status-panel"></div>
      <div id="snapshot-panel-container"></div>
      <div id="segment-panel-container"></div>
      <div id="map"></div>
    </div>

    <div id="route-bar">
      <div id="route-selector"></div>
      <div id="route-bar-top">
        <span id="route-km">0.00 / 0.0 km</span>
        <div id="route-drive-controls">
          <button id="btn-route-prev">◀</button>
          <button id="btn-route-next">▶</button>
        </div>
      </div>
      <div id="route-track">
        <div id="route-track-fill"></div>
        <div id="route-track-handle"></div>
      </div>
      <div id="gps-drive-panel" hidden>
        <div id="gdp-info">
          <span id="gdp-dist"></span>
          <span id="gdp-label"></span>
        </div>
        <div id="gdp-actions">
          <button id="gdp-jump">⇒ Seuraava</button>
          <button id="gdp-aseta" class="btn-status-primary">✓ Aseta</button>
          <button id="gdp-ohita" class="btn-status-secondary">Ei tarpeen</button>
        </div>
      </div>
    </div>

    <div id="marker-modal-backdrop"></div>
    <div id="marker-modal">
      <div id="marker-modal-header">
        <h2>Merkit (<span id="marker-count">0</span>)</h2>
        <button id="btn-modal-close">✕</button>
      </div>
      <div id="marker-modal-items"></div>
    </div>

    <div id="sign-type-dropdown"></div>
    <div id="floating-picker"></div>
    <div id="distance-warning" style="display:none;position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:3000;background:#b45309;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;pointer-events:none"></div>
    <div id="map-state-banner" hidden style="position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:3000;background:#1e40af;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;pointer-events:none;white-space:nowrap">🗺 Kartta valmisteilla — odota järjestäjän hyväksyntää</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
