<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Karttamaster</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <span id="app-brand">Karttamaster</span>
        <div id="toolbar-actions">
          <button id="btn-list">Kaikki merkit</button>
          <button id="btn-varuste" data-role-hide="järjestäjä" aria-label="Varustelista">🎒 Varustelista</button>
          <button id="btn-menu" aria-label="Tilivalikko">⋯</button>
        </div>
      </div>
      <div id="toolbar-menu">
        <div id="account-menu-section"></div>
        <div class="menu-sep"></div>
        <button id="btn-layer">Karttatyyli</button>
        <div class="menu-sep"></div>
        <div id="phase-switcher-container" data-role-hide="talkoolainen"></div>
        <div class="menu-sep"></div>
        <button id="btn-snapshot-panel">Varmuuskopiot</button>
        <div id="gpkg-menu-sep" class="menu-sep"></div>
        <a id="btn-gpkg-export" href="/api/gpkg/export" download>Vie kartta-aineisto</a>
        <button id="btn-gpkg-import">Tuo kartta-aineisto</button>
        <input id="gpkg-file-input" type="file" accept=".gpkg" hidden />
        <span id="gpkg-import-status" class="gpkg-import-status"></span>
      </div>

      <div id="app-main">
        <div id="left-panel">
          <div id="left-panel-header">
            <span class="left-panel-section-title">Suunnittelu</span>
            <button id="left-panel-toggle" aria-label="Sulje paneeli">◀</button>
          </div>
          <div id="left-panel-content">
            <div class="left-panel-section">
              <div id="sign-type-dropdown"></div>
            </div>
            <div class="left-panel-section">
              <div id="segment-panel-container"></div>
            </div>
            <div class="left-panel-section">
              <div id="area-panel-container"></div>
            </div>
          </div>
        </div>

        <div id="map-area">
          <div id="status-panel"></div>
<div id="segment-view-container"></div>
          <div id="map"></div>
        </div>
      </div>
    </div>

    <div id="route-bar">
      <div id="route-bar-main">
        <div id="route-selector"></div>
        <div id="route-bar-top">
          <span id="route-km">0.00 / 0.0 km</span>
          <div id="route-drive-controls">
            <button id="btn-route-prev">◀</button>
            <button id="btn-route-next">▶</button>
          </div>
        </div>
      </div>
      <div id="route-track">
        <div id="route-track-fill"></div>
        <div id="route-track-handle"></div>
      </div>
    </div>

    <div id="marker-modal-backdrop"></div>
    <div id="marker-modal">
      <div id="marker-modal-header">
        <h2>Merkkilista (<span id="marker-count">0</span>)</h2>
        <button id="btn-modal-close">✕</button>
      </div>
      <div id="marker-modal-items"></div>
    </div>

    <div id="floating-picker"></div>
    <div id="distance-warning" style="display:none;position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:3000;background:#b45309;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;pointer-events:none"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
