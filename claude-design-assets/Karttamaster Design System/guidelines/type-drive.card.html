<!-- @dsCard group="Type" viewport="700x260" name="Drive scale & weights" subtitle="The one sanctioned break from the 11–14px ceiling" -->
<!DOCTYPE html>
<html lang="fi" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-app); color: var(--text-body); font-family: var(--font-ui); padding: 22px; display: flex; gap: 32px; align-items: flex-start; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); font-weight: 700; }
  .meta { font-size: 11px; color: var(--text-meta); }
</style>
</head>
<body>
  <div class="col">
    <span class="lbl">Drive read-out</span>
    <span style="font-size:40px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums">300 m →</span>
    <span class="meta">--text-drive-lg 40px · only for glanceable GPS distance</span>
    <span style="font-size:28px;font-weight:700;line-height:1">Seuraava merkki</span>
    <span class="meta">--text-drive 28px</span>
  </div>
  <div class="col">
    <span class="lbl">Weights · tracking</span>
    <span style="font-size:14px;font-weight:400">400 Regular — body</span>
    <span style="font-size:14px;font-weight:600">600 Medium — buttons, labels</span>
    <span style="font-size:14px;font-weight:700">700 Bold — titles, distances</span>
    <span style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-muted)">0.04em uppercase label</span>
  </div>
</body>
</html>
