<!-- @dsCard group="Colors" viewport="700x190" name="Neutral — slate scale" subtitle="Structural neutral: dark chrome ↔ light field surfaces" -->
<!DOCTYPE html>
<html lang="fi" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-app); color: var(--text-body); font-family: var(--font-ui); padding: 22px; }
  .swatches { display: flex; gap: 8px; }
  .sw { flex: 1; }
  .chip { height: 52px; border-radius: var(--radius-sm); border: 1px solid var(--border-card); }
  .name { font-size: 10px; color: var(--text-muted); margin-top: 6px; }
  .hex { font-size: 10px; color: var(--text-meta); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:var(--slate-950)"></div><div class="name">950</div><div class="hex">#0f172a</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-900)"></div><div class="name">900</div><div class="hex">#1e293b</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-700)"></div><div class="name">700</div><div class="hex">#475569</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-500)"></div><div class="name">500</div><div class="hex">#64748b</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-400)"></div><div class="name">400</div><div class="hex">#94a3b8</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-200)"></div><div class="name">200</div><div class="hex">#e2e8f0</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-100)"></div><div class="name">100</div><div class="hex">#f1f5f9</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-50)"></div><div class="name">50</div><div class="hex">#f8fafc</div></div>
  </div>
</body>
</html>
