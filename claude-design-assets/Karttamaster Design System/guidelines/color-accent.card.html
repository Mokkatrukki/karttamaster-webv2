<!-- @dsCard group="Colors" viewport="700x180" name="Brand accent — amber" subtitle="The single 'do the main thing' colour" -->
<!DOCTYPE html>
<html lang="fi" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-app); color: var(--text-body); font-family: var(--font-ui); padding: 22px; }
  .swatches { display: flex; gap: 12px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-sm); display: flex; align-items: flex-end; padding: 6px 8px; font-size: 11px; font-weight: 700; }
  .name { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  .hex { font-size: 11px; color: var(--text-meta); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:var(--amber-700);color:#fff">700</div><div class="name">--amber-700</div><div class="hex">#b45309</div></div>
    <div class="sw"><div class="chip" style="background:var(--amber-600);color:#fff">600</div><div class="name">--amber-600</div><div class="hex">#d97706</div></div>
    <div class="sw"><div class="chip" style="background:var(--amber-500);color:#111">500 · accent</div><div class="name">--accent</div><div class="hex">#f59e0b</div></div>
    <div class="sw"><div class="chip" style="background:var(--amber-400);color:#111">400</div><div class="name">--amber-400</div><div class="hex">#fbbf24</div></div>
    <div class="sw"><div class="chip" style="background:var(--amber-300);color:#111">300</div><div class="name">--amber-300</div><div class="hex">#fcd34d</div></div>
  </div>
</body>
</html>
