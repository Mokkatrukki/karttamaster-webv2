server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # T279/V195 — gzip tekstivarat
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
    gzip_vary on;

    # T279/V195 — content-hashatut assetit: ikuinen immutable-cache (Viten hash-nimet)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # robots.txt: text/plain, kevyt cache
    location = /robots.txt {
        add_header Cache-Control "public, max-age=3600";
    }

    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        try_files /admin.html =404;
    }

    location = /inventaario {
        try_files /inventory.html =404;
    }

    location = /patkat {
        try_files /patkat.html =404;
    }

    # HTML-sivut: ei immutable-cachea → uusi deploy näkyy heti (V195)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
